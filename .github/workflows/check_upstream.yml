name: Check Upstream Termux Version
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest Termux version
        id: upstream
        run: |
          LATEST=$(curl -sL "https://api.github.com/repos/termux/termux-app/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": *"//;s/".*//')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest upstream version: $LATEST"

      - name: Get current version
        id: current
        uses: actions/checkout@v6
      - run: |
          CURRENT=$(grep "TERMUX_APP_VERSION_NAME" gradle.properties | cut -d= -f2)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Create issue if update available
        if: steps.upstream.outputs.latest != steps.current.outputs.current
        uses: actions/github-script@v7
        with:
          script: |
            const upstream = '${{ steps.upstream.outputs.latest }}';
            const current = '${{ steps.current.outputs.current }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⬆️ Upstream Update Available: ${upstream} (current: ${current})`,
              body: `Original Termux has released **${upstream}**.\n\nYour current version: **${current}**\n\nRun this command in Termux to update:\n\`\`\`bash\nsed -i 's/TERMUX_APP_VERSION_NAME=.*/TERMUX_APP_VERSION_NAME=${upstream}/' gradle.properties\ngit add gradle.properties && git commit -m "chore: sync with upstream ${upstream}" && git push origin main\n\`\`\``,
              labels: ['upstream-update']
            });
